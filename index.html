<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classwork — Homework Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Classwork</span>
    </div>
    <div class="header-sub">homework tracker</div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR: Classes -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>My Classes</h2>
        <button class="btn-icon" id="addClassBtn" title="Add class">+</button>
      </div>

      <!-- Add class form (hidden by default) -->
      <div class="add-class-form hidden" id="addClassForm">
        <input type="text" id="classNameInput" placeholder="Class name..." maxlength="30" />
        <div class="color-picker" id="colorPicker"></div>
        <div class="form-actions">
          <button class="btn-cancel" id="cancelClassBtn">Cancel</button>
          <button class="btn-confirm" id="confirmClassBtn">Add</button>
        </div>
      </div>

      <ul class="class-list" id="classList"></ul>

      <div class="sidebar-empty hidden" id="sidebarEmpty">
        <p>No classes yet.<br/>Hit <strong>+</strong> to add one.</p>
      </div>
    </aside>

    <!-- MAIN PANEL -->
    <main class="main-panel" id="mainPanel">

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📚</div>
        <h1>Welcome to Classwork</h1>
        <p>Create a class on the left to start tracking your homework.</p>
      </div>

      <!-- Class view (hidden until class selected) -->
      <div class="class-view hidden" id="classView">
        <div class="class-header">
          <div class="class-title-row">
            <div class="class-dot" id="classDot"></div>
            <h1 id="classTitle"></h1>
            <button class="btn-delete-class" id="deleteClassBtn" title="Delete class">🗑</button>
          </div>
          <div class="class-stats" id="classStats"></div>
        </div>

        <!-- Add homework -->
        <div class="add-hw-section">
          <div class="add-hw-row">
            <input type="text" id="hwName" placeholder="Assignment name..." maxlength="80"/>
            <input type="date" id="hwDue" />
            <button class="btn-add-hw" id="addHwBtn">Add</button>
          </div>
        </div>

        <!-- Filter tabs -->
        <div class="filter-tabs">
          <button class="tab active" data-filter="pending">Pending</button>
          <button class="tab" data-filter="done">Completed</button>
          <button class="tab" data-filter="all">All</button>
        </div>

        <!-- Homework list -->
        <ul class="hw-list" id="hwList"></ul>
        <div class="hw-empty hidden" id="hwEmpty">
          <p>No assignments here yet.</p>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
